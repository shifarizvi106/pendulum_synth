<html>
  <head> 
    <title>Pendulum Synth</title>
  </head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #F7D6E0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Times New Roman', Serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    #info {
      position: absolute;
      bottom: 75px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      letter-spacing: 2px;
      color: #8B4A5A;
      font-weight: bold;
    } 
  </style>
  <body>
    <div id="info">🌸 Pendulum Synth</div>
    <script>
      // ========== VARIABLES ==========
      let pendulums = [];
      let numPendulums = 8;
      let synth;
      let synth2;
      let reverb;
      let audioInitialized = false; // FLAG TO TRACK AUDIO STATE
      
      const melodyNotes = [
        'A4', 'C4', 'E4', 'G4', 
        'B4', 'D4', 'F4', 'A4'
      ];

      // ========== SETUP ==========
      function setup() {
        let canvasSize = min(windowWidth * 0.9, windowHeight * 0.8, 900);
        createCanvas(canvasSize, canvasSize * 0.7);
        
        // AUDIO SETUP REMOVED - WILL BE INITIALIZED ON CLICK

        let startLength = 80;
        let endLength = 380;
        let spacing = (endLength - startLength) / (numPendulums - 1);
        
        for (let i = 0; i < numPendulums; i++) {
          let length = startLength + i * spacing;
          let angle = map(i, 0, numPendulums - 1, -0.3, 0.3);
          
          pendulums.push({
            length: length,
            angle: angle,
            angVel: 0,
            angAcc: 0,
            prevAngle: angle
          });
        }
        console.log("Setup complete! Click the page to start audio.");
      }

      // ========== DRAW ==========
      function draw() {
        background('#F7D6E0'); 
        
        let pivotX = width / 2;
        let pivotY = height * 0.15;
        
        for (let i = 0; i < pendulums.length; i++) {
          let p = pendulums[i];
          
          // --- PHYSICS ---
          p.angAcc = (-0.5 / p.length) * sin(p.angle);
          p.angVel += p.angAcc;
          p.angVel *= 0.999;
          p.angle += p.angVel;
          
          // --- TRIGGER CHECK ---
          if ((p.prevAngle < 0 && p.angle >= 0) || (p.prevAngle > 0 && p.angle <= 0)) {
            triggerNote(i);
          }
          p.prevAngle = p.angle;
          
          // --- CALCULATE BOB POSITION ---
          let bobX = pivotX + p.length * sin(p.angle);
          let bobY = pivotY + p.length * cos(p.angle);
          
          // --- DRAW ROD ---
          stroke(200, 150, 160);
          strokeWeight(2);
          line(pivotX, pivotY, bobX, bobY);
          
          // --- DRAW BOB ---
          let bobSize = map(p.length, 80, 380, 22, 38);
          
          // Glow layers
          for (let g = 3; g > 0; g--) {
            fill(255, 183, 197, 30 - g * 10);
            noStroke();
            ellipse(bobX, bobY, bobSize + g * 8);
          }
          
          // Main bob
          fill(255, 183, 197);
          noStroke();
          ellipse(bobX, bobY, bobSize);
          
          // Highlight
          fill(255, 255, 255, 80);
          ellipse(bobX - bobSize * 0.2, bobY - bobSize * 0.2, bobSize * 0.3);
        }
      }

      // ========== TRIGGER NOTE ==========
      function triggerNote(index) {
        // Don't try to play audio if it's not initialized
        if (!audioInitialized) return;

        let note = melodyNotes[index % melodyNotes.length];
        let velocity = random(0.5, 0.9);
        
        synth.noteAttack(note, velocity * 0.8);
        synth2.noteAttack(note, velocity * 0.3);
        
        setTimeout(() => {
          synth.noteRelease(note);
          synth2.noteRelease(note);
        }, 600);
      }

      // ========== MOUSE PRESSED ==========
      function mousePressed() {
        if (!audioInitialized) {
          userStartAudio();
          synth = new p5.PolySynth();
          synth2 = new p5.PolySynth();
          synth2.set('sawtooth');
          
          reverb = new p5.Reverb();
          reverb.set(3, 2);
          synth.connect(reverb);
          synth2.connect(reverb);
          
          audioInitialized = true;
          console.log("✅ Audio initialized! Click again to start the wave.");
        }
      }

      // ========== WINDOW RESIZED ==========
      function windowResized() {
        let canvasSize = min(windowWidth * 0.9, windowHeight * 0.8, 900);
        resizeCanvas(canvasSize, canvasSize * 0.7);
      }
    </script>                                        
  </body>
</html>
