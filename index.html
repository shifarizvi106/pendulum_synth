<html>
  <head> 
    <title>Pendulum Synth</title>
  </head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #F7D6E0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Times New Roman', Serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    #info {
      position: absolute;
      bottom: 75px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      letter-spacing: 2px;
      color: #8B4A5A;
      font-weight: bold;
    } 
    #status {
      position: absolute;
      top: 75px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #8B4A5A;
      background: rgba(255,255,255,0.7);
      padding: 8px 16px;
      border-radius: 20px;
      font-family: 'Times New Roman', Serif;
    }
  </style>
  <body>
    <div id="info">🌸 Pendulum Synth</div>
    <div id="status">🔇 Click to start audio</div>
    <script>
      // ========== VARIABLES ==========
      let pendulums = [];
      let numPendulums = 8;
      let audioReady = false;
      let osc;
      let envelope;
      let reverb;
      
      const melodyNotes = [
        'A4', 'C4', 'E4', 'G4', 
        'B4', 'D4', 'F4', 'A4'
      ];

      // ========== SETUP ==========
      function setup() {
        let canvasSize = min(windowWidth * 0.9, windowHeight * 0.8, 900);
        createCanvas(canvasSize, canvasSize * 0.7);
        
        let startLength = 80;
        let endLength = 380;
        let spacing = (endLength - startLength) / (numPendulums - 1);
        
        for (let i = 0; i < numPendulums; i++) {
          let length = startLength + i * spacing;
          let angle = map(i, 0, numPendulums - 1, -0.3, 0.3);
          
          pendulums.push({
            length: length,
            angle: angle,
            angVel: 0,
            angAcc: 0,
            prevAngle: angle,
            note: melodyNotes[i]
          });
        }
        
        // Create audio components but don't start them yet
        envelope = new p5.Envelope();
        envelope.setADSR(0.01, 0.1, 0.5, 0.3);
        envelope.setRange(0.8, 0);
        
        reverb = new p5.Reverb();
        reverb.set(3, 2);
        
        console.log("✅ Setup complete! Click the canvas to start audio.");
      }

      // ========== DRAW ==========
      function draw() {
        background('#F7D6E0'); 
        
        let pivotX = width / 2;
        let pivotY = height * 0.15;
        
        for (let i = 0; i < pendulums.length; i++) {
          let p = pendulums[i];
          
          // --- PHYSICS ---
          p.angAcc = (-0.5 / p.length) * sin(p.angle);
          p.angVel += p.angAcc;
          p.angVel *= 0.999;
          p.angle += p.angVel;
          
          // --- TRIGGER CHECK ---
          if ((p.prevAngle < 0 && p.angle >= 0) || (p.prevAngle > 0 && p.angle <= 0)) {
            playNote(i);
          }
          p.prevAngle = p.angle;
          
          // --- CALCULATE BOB POSITION ---
          let bobX = pivotX + p.length * sin(p.angle);
          let bobY = pivotY + p.length * cos(p.angle);
          
          // --- DRAW ROD ---
          stroke(200, 150, 160);
          strokeWeight(2);
          line(pivotX, pivotY, bobX, bobY);
          
          // --- DRAW BOB ---
          let bobSize = map(p.length, 80, 380, 22, 38);
          
          // Glow layers
          for (let g = 3; g > 0; g--) {
            fill(255, 183, 197, 30 - g * 10);
            noStroke();
            ellipse(bobX, bobY, bobSize + g * 8);
          }
          
          // Main bob
          fill(255, 183, 197);
          noStroke();
          ellipse(bobX, bobY, bobSize);
          
          // Highlight
          fill(255, 255, 255, 80);
          ellipse(bobX - bobSize * 0.2, bobY - bobSize * 0.2, bobSize * 0.3);
        }
      }

      // ========== PLAY NOTE ==========
      function playNote(index) {
        if (!audioReady) {
          console.log("⏳ Audio not ready yet");
          return;
        }
        
        let p = pendulums[index];
        let freq = midiToFreq(p.note);
        let velocity = random(0.3, 0.7);
        
        console.log("🔊 Playing: " + p.note + " from pendulum " + index);
        
        try {
          // Create a new oscillator for each note
          let osc = new p5.Oscillator('sine');
          osc.freq(freq);
          osc.amp(0);
          osc.start();
          osc.connect(reverb);
          
          // Use envelope to control volume
          envelope.play(osc, 0, 0.1, velocity);
          
          // Stop oscillator after note ends
          setTimeout(() => {
            osc.stop();
          }, 400);
        } catch (error) {
          console.error("Error playing note:", error);
        }
      }

      // ========== START AUDIO ==========
      function startAudio() {
        console.log("🔊 Starting audio...");
        
        userStartAudio();
        
        // Make sure audio context is running
        if (getAudioContext().state !== 'running') {
          getAudioContext().resume();
        }
        
        // Test with a simple beep
        let testOsc = new p5.Oscillator('sine');
        testOsc.freq(440);
        testOsc.amp(0.3);
        testOsc.start();
        setTimeout(() => {
          testOsc.stop();
          console.log("✅ Audio test beep played! Audio is working.");
        }, 300);
        
        // Reverb is already created in setup
        
        audioReady = true;
        document.getElementById('status').innerHTML = '🎵 Audio ready! Playing your melody...';
      }

      // ========== MOUSE PRESSED ==========
      function mousePressed() {
        if (!audioReady) {
          startAudio();
        }
      }

      // ========== KEYBOARD - Space to test ==========
      function keyPressed() {
        if (key === ' ') {
          if (!audioReady) {
            startAudio();
          } else {
            // Play a test note
            let testOsc = new p5.Oscillator('sine');
            testOsc.freq(523); // C5
            testOsc.amp(0.3);
            testOsc.start();
            setTimeout(() => {
              testOsc.stop();
              console.log("🔊 Test note: C5");
            }, 300);
          }
        }
      }

      // ========== WINDOW RESIZED ==========
      function windowResized() {
        let canvasSize = min(windowWidth * 0.9, windowHeight * 0.8, 900);
        resizeCanvas(canvasSize, canvasSize * 0.7);
      }
    </script>                                        
  </body>
</html>
